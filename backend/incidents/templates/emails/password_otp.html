<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial; background: #f4f6f8; padding: 20px; }
        .box {
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            max-width: 400px;
            margin: auto;
            text-align: center;
        }
        .otp {
            font-size: 28px;
            font-weight: bold;
            color: #0d6efd;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Hello {{ username }}</h2>
        <p>Your password reset OTP is:</p>
        <div class="otp">{{ otp }}</div>
        <p>This OTP is valid for 10 minutes.</p>
        <p>If you didn’t request this, ignore this email.</p>
    </div>
</body>
</html>
